<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>passgen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{border-color:var(--error)}50%{border-color:var(--pink)}}
@keyframes slideDown{from{max-height:0;opacity:0}to{max-height:300px;opacity:1}}
@keyframes slideUp{from{max-height:300px;opacity:1}to{max-height:0;opacity:0}}
@keyframes checkPop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--fg);
  padding:20px 24px 16px;max-width:400px;margin:0 auto;
  overflow-y:auto;height:100vh;display:flex;flex-direction:column;
}
:root{
  --bg:#f5f3ff;--card:#fff;--fg:#1a1a2e;--border:#e5e7eb;--muted:#999;
  --shadow:rgba(90,20,140,.08);--chipbg:#ede9fe;--hover:#ede9fe;
  --errbg:#fff;--pink:#f472b6;--crimson:#e11d48;--lilac:#a855f7;--lilac2:#7c3aed;
  --violet:#8b5cf6;--error:#f43f5e
}
::-webkit-scrollbar{display:none}

h1{font-size:20px;font-weight:700;color:var(--lilac2);margin-bottom:14px;letter-spacing:-.3px;flex-shrink:0;animation:fadeUp .4s ease}

.card{
  background:var(--card);border-radius:12px;padding:14px 16px 12px;margin-bottom:10px;
  box-shadow:0 1px 4px var(--shadow);flex-shrink:0;
  animation:fadeUp .4s ease both
}
.card:nth-child(2){animation-delay:.05s}
.card:nth-child(3){animation-delay:.1s}
.card-title{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

label{display:block;font-size:13px;font-weight:600;color:var(--fg);margin-bottom:3px}

input[type="text"],input[type="number"]{
  width:100%;padding:10px 12px;font-size:14px;font-family:inherit;
  border:1.5px solid var(--border);border-radius:10px;background:var(--card);
  color:var(--fg);outline:none;
  transition:border-color .25s,box-shadow .25s,background .25s
}
input:focus{border-color:var(--lilac);box-shadow:0 0 0 3px rgba(168,85,247,.12)}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield}
input.error{border-color:var(--error);animation:glow 1.5s ease infinite}

.svc-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.svc-header label{margin-bottom:0;flex:1}
.svc-expand{
  color:var(--lilac);font-size:12px;cursor:pointer;user-select:none;font-weight:500;
  display:flex;align-items:center;gap:3px;transition:color .2s
}
.svc-expand:hover{color:var(--lilac2)}
.svc-expand .arrow{display:inline-block;transition:transform .25s;font-size:10px}
.svc-expand.open .arrow{transform:rotate(180deg)}
.svc-panel{
  overflow:hidden;max-height:0;transition:max-height .3s ease,opacity .25s ease,margin .25s;opacity:0
}
.svc-panel.open{max-height:300px;opacity:1;margin-top:8px}
.svc-grid{display:flex;flex-wrap:wrap;gap:6px}
.svc-chip{
  padding:5px 12px;border-radius:16px;font-size:12px;font-weight:500;
  border:1.5px solid var(--border);background:var(--card);color:var(--fg);
  cursor:pointer;transition:all .2s;user-select:none
}
.svc-chip:hover{border-color:var(--lilac);background:var(--bg);transform:translateY(-1px)}
.svc-chip:active{transform:scale(.96)}

.row{display:flex;gap:24px;align-items:flex-start}
.col{flex:0 0 auto}

.len-group{display:flex;align-items:center;gap:3px}
.len-group input{width:52px;text-align:center;font-weight:600}
.len-btn{display:flex;flex-direction:column;gap:2px}
.len-btn button{
  width:26px;height:15px;border:1.5px solid var(--border);border-radius:4px;
  background:var(--card);color:var(--lilac);font-size:9px;cursor:pointer;padding:0;line-height:0;
  transition:background .15s,transform .1s
}
.len-btn button:hover{background:var(--hover)}
.len-btn button:active{transform:scale(.9)}

.chk-grid{display:grid;grid-template-columns:auto auto;gap:5px 20px}
.chk-item{
  display:flex;align-items:center;gap:7px;cursor:pointer;
  font-size:13px;color:var(--fg);user-select:none;transition:transform .1s
}
.chk-item:active{transform:scale(.95)}
.chk-circle{
  width:18px;height:18px;border-radius:50%;
  border:2px solid #c4bcd4;display:flex;align-items:center;
  justify-content:center;transition:all .25s cubic-bezier(.4,0,.2,1);flex-shrink:0
}
.chk-circle.on{
  border-color:var(--lilac);background:var(--lilac);
  animation:checkPop .3s cubic-bezier(.4,0,.2,1)
}
.chk-circle.on::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--card)}

.btn{
  width:100%;padding:10px;font-size:14px;font-weight:600;font-family:inherit;
  border:none;border-radius:11px;cursor:pointer;flex-shrink:0;
  transition:transform .12s,box-shadow .25s,opacity .2s;animation:fadeUp .4s ease both
}
.btn:active{transform:scale(.97)}
.btn-primary{
  background:linear-gradient(135deg,var(--lilac),var(--lilac2));color:#fff;
  box-shadow:0 2px 8px rgba(168,85,247,.3);animation-delay:.15s
}
.btn-primary:hover{box-shadow:0 4px 14px rgba(168,85,247,.4)}
.btn-secondary{
  background:linear-gradient(135deg,var(--violet),#8b5cf6);color:#fff;
  box-shadow:0 2px 8px rgba(167,139,250,.3);animation-delay:.25s
}
.btn-secondary:hover{box-shadow:0 4px 14px rgba(167,139,250,.4)}

.pwd-field{
  width:100%;padding:12px;font-size:15px;font-weight:600;
  font-family:'SF Mono','Fira Code',monospace;
  border:1.5px solid var(--border);border-radius:10px;background:var(--card);
  color:var(--fg);text-align:center;outline:none;letter-spacing:.5px;
  transition:border-color .25s
}

.str-wrap{margin-top:6px}
.str-bars{display:flex;gap:4px}
.str-bar{height:4px;flex:1;border-radius:3px;background:var(--border);transition:background .4s ease}
.str-bar.on.weak{background:var(--pink)}
.str-bar.on.medium{background:var(--crimson)}
.str-bar.on.strong{background:var(--lilac)}
.str-info{font-size:13px;margin-top:4px;transition:all .3s}
.str-info.weak{color:var(--error)}
.str-info.medium{color:var(--crimson)}
.str-info.strong{color:var(--lilac)}

.error{font-size:12px;color:var(--error);min-height:16px;margin-top:2px}

.msg{text-align:center;font-size:13px;color:var(--lilac);font-weight:600;min-height:20px;margin-top:3px}

.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:18px;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.15);max-height:80vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:700;color:var(--lilac2);margin-bottom:10px}
.modal-svc{display:flex;align-items:center;gap:7px;padding:5px 0;font-size:13px;color:var(--fg);cursor:pointer}
.modal-svc input{accent-color:var(--lilac);width:16px;height:16px;cursor:pointer}
.modal-actions{display:flex;gap:8px;margin-top:12px}
.modal-btn{flex:1;padding:8px;font-size:12px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:transform .1s}
.modal-btn:active{transform:scale(.96)}
.modal-btn-primary{background:linear-gradient(135deg,var(--lilac),var(--lilac2));color:#fff}
.modal-btn-secondary{background:var(--border);color:var(--fg)}

.rart-wrap{margin-top:10px}
.rart-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.rart{display:flex;flex-wrap:wrap;gap:8px;padding:10px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;justify-content:center}
.rart-img{width:128px;height:128px;border-radius:12px;border:1.5px solid var(--border);transition:transform .2s;cursor:default}
.rart-img:hover{transform:scale(1.05)}

</style>
</head>
<body>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
  <h1 style="margin-bottom:0">passgen</h1>
  <div style="display:flex;gap:6px;align-items:center">
    <span style="font-size:11px;color:var(--muted);cursor:pointer;user-select:none" onclick="exportData()">Экспорт</span>
    <span style="font-size:11px;color:var(--muted);cursor:pointer;user-select:none" onclick="document.getElementById('importFile').click()">Импорт</span>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <div class="modal-overlay" id="importModal">
      <div class="modal-box">
        <div class="modal-title">Выберите сервисы для импорта</div>
        <div id="modalList"></div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-secondary" onclick="closeImportModal()">Отмена</button>
          <button class="modal-btn modal-btn-primary" onclick="confirmImport()">Импортировать</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">Доступ</div>
  <label>Сид</label>
  <div style="font-size:11px;color:#999;margin-bottom:5px;margin-top:-2px">Секретная фраза, которую вы держите в голове.</div>
  <input type="text" id="seed" placeholder="Ваша секретная фраза">
  <div class="error" id="seedErr"></div>
</div>

<div class="card">
  <div class="card-title">Сервис</div>
  <div class="svc-header">
    <label>Название сервиса</label>
    <span class="svc-expand" id="svcToggle" onclick="toggleSvcPanel()">
      <span class="arrow">&#9660;</span> список
    </span>
  </div>
  <input type="text" id="service" placeholder="google, github, vk ...">
  <div class="svc-panel" id="svcPanel">
    <div class="svc-grid" id="svcGrid"></div>
  </div>
  <div class="error" id="svcErr"></div>
</div>

<div class="card">
  <div class="card-title">Параметры</div>
  <div style="margin-bottom:8px">
    <select id="preset" onchange="applyPreset()" style="width:100%;padding:6px 10px;font-size:12px;font-family:inherit;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--fg);outline:none">
      <option value="custom">Свой</option>
      <option value="min">Минимальный (8, буквы+цифры)</option>
      <option value="std">Стандартный (10, всё кроме спецсимволов)</option>
      <option value="max">Максимальный (16, всё)</option>
    </select>
  </div>
  <div class="row">
    <div class="col">
      <label>Длина</label>
      <div class="len-group">
        <input type="number" id="length" value="10" min="1" max="99">
        <div class="len-btn">
          <button onclick="adj(1)">&#9650;</button>
          <button onclick="adj(-1)">&#9660;</button>
        </div>
      </div>
    </div>
    <div class="col">
      <label>Символы</label>
      <div class="chk-grid" id="chkGrid"></div>
      <div style="margin-top:8px">
        <span style="font-size:11px;color:var(--lilac);cursor:pointer;user-select:none;font-weight:500" onclick="toggleAdvanced()">
          <span id="advArrow" style="display:inline-block;transition:transform .25s;font-size:10px">&#9654;</span> Расширенные
        </span>
        <div id="advPanel" style="overflow:hidden;max-height:0;transition:max-height .3s ease,opacity .25s;opacity:0">
          <div style="display:flex;flex-direction:column;gap:4px;padding-top:6px">
            <div class="chk-item" onclick="toggleInv('cap')" style="font-size:12px">
              <span class="chk-circle" id="invCap"></span>
              <span>Первая заглавная</span>
            </div>
            <div class="chk-item" onclick="toggleInv('dig')" style="font-size:12px">
              <span class="chk-circle" id="invDig"></span>
              <span>Последняя цифра</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="btn btn-primary" onclick="gen()">Создать</button>

<div class="card" style="margin-top:12px">
  <div class="card-title">Пароль</div>
  <input class="pwd-field" id="pwd" readonly>
  <div class="str-wrap" id="strWrap">
    <div class="str-bars" id="strBars"></div>
    <div class="str-info" id="strInfo"></div>
  </div>
  <div class="rart-wrap" id="rartWrap" style="display:none">
    <div class="rart-title">Визуальный код</div>
    <div class="rart" id="rart"></div>
  </div>
</div>

<button class="btn btn-secondary" onclick="cpy()">Копировать</button>
<div class="msg" id="msg"></div>

<script>
const CHK = [
  ['capitals','Заглавные','ABCDEFGHJKLMNPQRSTUVWXYZ'],
  ['lowercase','Строчные','abcdefghikmnpqrstuvwxyz'],
  ['digits','Цифры','0123456789'],
  ['symbols','Спецсимволы','!@#$%&*+=-.'],
];
const POPULAR = [
  {n:'google',  l:'g', c:'#4285f4'},
  {n:'github',  l:'GH',c:'#333'},
  {n:'vk',      l:'V', c:'#4a76a8'},
  {n:'yandex',  l:'Ya',c:'#fc3f1d'},
  {n:'mail',    l:'@', c:'#005ff9'},
  {n:'icloud',  l:'i', c:'#369'},
  {n:'onliner', l:'O', c:'#f60'},
  {n:'kufar',   l:'K', c:'#66c'},
];

let perSvc = {};
let curSvc = '(empty)';
let svcs = [];

function getCfg(svc){
  if(!perSvc[svc]) perSvc[svc]={state:{capitals:1,lowercase:1,digits:0,symbols:1},inv:{cap:0,dig:0},len:10};
  return perSvc[svc];
}
function applyCfg(cfg){
  window.state=cfg.state; window.inv=cfg.inv;
  document.getElementById('length').value=cfg.len;
  renderChk(); renderInv();
}
function saveCfg(){
  perSvc[curSvc] = {
    state: {...window.state},
    inv: {...window.inv},
    len: +document.getElementById('length').value
  };
  saveState();
}

function init(){
  loadState();
  if(!window.crypto||!window.crypto.subtle){
    document.getElementById('seedErr').textContent='Web Crypto API недоступен. Откройте через HTTPS или localhost.';
    document.querySelector('.btn-primary').disabled=true;
    return;
  }
  document.getElementById('seed').classList.remove('error');
  document.getElementById('seedErr').textContent='';
  document.getElementById('seed').addEventListener('input',()=>{
    document.getElementById('seed').classList.remove('error');
    document.getElementById('seedErr').textContent='';
  });
  document.getElementById('seed').addEventListener('keydown',e=>{if(e.key==='Enter')gen()});
  document.getElementById('service').addEventListener('keydown',e=>{if(e.key==='Enter')gen()});
  document.getElementById('service').addEventListener('blur',()=>{
    const svc=document.getElementById('service').value.trim()||'(empty)';
    if(svc!==curSvc){curSvc=svc; if(perSvc[svc]) applyCfg(perSvc[svc]);}
  });
  if(perSvc[curSvc]) applyCfg(perSvc[curSvc]);
  else {
    curSvc='(empty)'; document.getElementById('service').value='';
    window.state={capitals:1,lowercase:1,digits:0,symbols:1};
    window.inv={cap:0,dig:0};
    renderChk(); renderInv();
  }
  renderSvcChips();
}

function loadState(){
  try{localStorage.removeItem('passgen_state');}catch(e){}
  perSvc = {};
  svcs = [];
  curSvc = '(empty)';
  window.state = {capitals:1,lowercase:1,digits:0,symbols:1};
  window.inv = {cap:0,dig:0};
  document.getElementById('length').value = 10;
  document.getElementById('service').value = '';
}
function onSvcChange(){
  const svc=document.getElementById('service').value.trim()||'(empty)';
  curSvc=svc;
  if(perSvc[svc]) applyCfg(perSvc[svc]);
}
function saveState(){}

function toggleInv(id){
  window.inv[id]=+!window.inv[id];
  document.getElementById('inv'+id.charAt(0).toUpperCase()+id.slice(1)).className='chk-circle'+(window.inv[id]?' on':'');
}

function applyPreset(){
  const v=document.getElementById('preset').value;
  if(v==='custom')return;
  switch(v){
    case'min':window.state={capitals:1,lowercase:1,digits:1,symbols:0};document.getElementById('length').value=8;break;
    case'std':window.state={capitals:1,lowercase:1,digits:1,symbols:0};document.getElementById('length').value=10;break;
    case'max':window.state={capitals:1,lowercase:1,digits:1,symbols:1};document.getElementById('length').value=16;break;
  }
  renderChk(); saveCfg();
}
function exportData(){
  // Only export settings for saved services
  const clean = {};
  [...svcs, '(empty)'].forEach(k => { if(perSvc[k]) clean[k] = perSvc[k]; });
  const data = { svcs, perSvc: clean };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='passgen_export.json';a.click();
}
let importDataCache = null;

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const d=JSON.parse(reader.result);
      if(!d.perSvc && !d.svcs){alert('Файл не содержит данных passgen');return;}
      importDataCache = d;
      showImportModal(d);
    }catch(err){alert('Ошибка импорта: неверный формат файла');}
  };
  reader.readAsText(file);
  e.target.value='';
}

function showImportModal(d){
  const list=document.getElementById('modalList');list.innerHTML='';
  const services=Object.keys(d.perSvc||{}).sort();
  if(services.length===0){alert('Нет сервисов для импорта');return;}
  services.forEach(s=>{
    const label=document.createElement('label');label.className='modal-svc';
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=true;cb.dataset.svc=s;
    label.appendChild(cb);
    const span=document.createElement('span');span.textContent=s;
    label.appendChild(span);
    list.appendChild(label);
  });
  document.getElementById('importModal').classList.add('open');
}

function closeImportModal(){
  document.getElementById('importModal').classList.remove('open');
  importDataCache=null;
}

function confirmImport(){
  const d=importDataCache; if(!d){closeImportModal();return;}
  const checks=document.querySelectorAll('#modalList input[type=checkbox]:checked');
  if(checks.length===0){alert('Выберите хотя бы один сервис');return;}
  checks.forEach(cb=>{
    const svc=cb.dataset.svc;
    if(d.perSvc[svc]) perSvc[svc]=d.perSvc[svc];
    if(!svcs.includes(svc)) svcs.push(svc);
  });
  svcs.sort();
  renderSvcChips();
  if(perSvc[curSvc]) applyCfg(perSvc[curSvc]);
  saveState();
  closeImportModal();
  document.getElementById('msg').textContent='Импорт завершён!';
  setTimeout(()=>document.getElementById('msg').textContent='',3000);
}
function toggleAdvanced(){
  const p=document.getElementById('advPanel');
  const a=document.getElementById('advArrow');
  if(p.style.maxHeight!='0px'&&p.style.maxHeight!=''){
    p.style.maxHeight='0px';p.style.opacity='0';
    a.style.transform='rotate(0deg)';
  }else{
    p.style.maxHeight='120px';p.style.opacity='1';
    a.style.transform='rotate(90deg)';
  }
}
function renderInv(){
  document.getElementById('invCap').className='chk-circle'+(window.inv.cap?' on':'');
  document.getElementById('invDig').className='chk-circle'+(window.inv.dig?' on':'');
}
function renderChk(){
  const g=document.getElementById('chkGrid');g.innerHTML='';
  for(const[id,lbl]of CHK){
    const d=document.createElement('div');d.className='chk-item';
    d.onclick=()=>{window.state[id]=+!window.state[id];renderChk();};
    const c=document.createElement('span');
    c.className='chk-circle'+(window.state[id]?' on':'');
    const t=document.createElement('span');t.textContent=lbl;
    d.appendChild(c);d.appendChild(t);g.appendChild(d);
  }
}

function adj(d){const i=document.getElementById('length');let v=+i.value+d;i.value=v<1?1:v>99?99:v;}

function toggleSvcPanel(){
  const p=document.getElementById('svcPanel');
  const t=document.getElementById('svcToggle');
  p.classList.toggle('open');
  t.classList.toggle('open');
}

function renderSvcChips(){
  const g=document.getElementById('svcGrid');g.innerHTML='';
  const shown=new Set();

  for(const s of POPULAR){
    if(svcs.indexOf(s.n)===-1){g.appendChild(chip(s,true,false));shown.add(s.n);}
  }

  for(const s of svcs){
    const pop=POPULAR.find(p=>s===p.n||s.startsWith(p.n+'/'));
    if(pop)g.appendChild(chip({n:s,l:pop.l,c:pop.c,orig:pop.n},true,true));
    else g.appendChild(chip(s,false,true));
  }
}
function chip(item, hasLogo, deletable){
  const isObj = typeof item === 'object';
  const name = isObj ? item.n : item;
  const d=document.createElement('div');d.className='svc-chip';
  if(isObj && hasLogo){
    const dot=document.createElement('span');
    dot.style.cssText='display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:'+item.c+';color:#fff;font-size:10px;font-weight:700;margin-right:4px;flex-shrink:0';
    dot.textContent=item.l;
    d.appendChild(dot);
    d.appendChild(document.createTextNode(name));
  } else {
    const dot=document.createElement('span');
    dot.style.cssText='display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--border);color:#999;font-size:10px;font-weight:700;margin-right:4px;flex-shrink:0';
    dot.textContent='?';
    d.appendChild(dot);
    d.appendChild(document.createTextNode(name));
  }
  d.onclick=()=>{
    document.getElementById('service').value=name;
    document.getElementById('svcPanel').classList.remove('open');
    document.getElementById('svcToggle').classList.remove('open');
    curSvc=name;
    if(perSvc[name]) applyCfg(perSvc[name]);
  };
  if(deletable){
    d.oncontextmenu=(e)=>{
      e.preventDefault();
      svcs=svcs.filter(s=>s!==name);
      renderSvcChips();
      saveState();
    };
    d.title='ПКМ для удаления';
  }
  return d;
}

async function gen(){
  if(!window.crypto||!window.crypto.subtle){document.getElementById('seedErr').textContent='Web Crypto API недоступен';return;}
  const seed=document.getElementById('seed').value.trim();
  const svc=document.getElementById('service').value.trim()||'(empty)';
  const len=+document.getElementById('length').value||10;
  document.getElementById('seed').classList.remove('error');
  if(!seed){
    document.getElementById('seed').classList.add('error');
    document.getElementById('seedErr').textContent='Введите сид';
    return;
  }
  const sets=Object.values(state).filter(Boolean).length;
  if(!sets){document.getElementById('seedErr').textContent='Выберите хотя бы один тип символов';return;}
  const alpha=CHK.filter(([id])=>state[id]).map(([,,l])=>l).join('');
  const pwd=await hmacGen(seed,svc,len,alpha);

  let finalPwd=pwd;
  if(inv.cap&&finalPwd.length>0)finalPwd=finalPwd[0].toUpperCase()+finalPwd.slice(1);
  if(inv.dig&&finalPwd.length>0){

    const dk=await crypto.subtle.importKey('raw',new TextEncoder().encode(seed+'_lastdig'),{name:'HMAC',hash:'SHA-256'},false,['sign']);
    const ds=await crypto.subtle.sign('HMAC',dk,new TextEncoder().encode(svc+len));
    const dd=new Uint8Array(ds);
    const digit='0123456789'[dd[0]%10];
    finalPwd=finalPwd.slice(0,-1)+digit;
  }
  document.getElementById('pwd').value=finalPwd;
  renderRandomart(finalPwd);
  updateStrength(len,sets);

  try{navigator.clipboard.writeText(finalPwd);document.getElementById('msg').textContent='Скопировано!';setTimeout(()=>document.getElementById('msg').textContent='',2000);}catch(e){}
  if(!svcs.includes(svc)&&svc!=='(empty)'){
    svcs.push(svc);svcs.sort();renderSvcChips();
  }
  curSvc=svc;
  saveCfg();
}

async function hmacGen(seed,svc,len,alpha){
  if(!alpha||alpha.length===0)return '';
  const enc=new TextEncoder();
  const keyBytes=enc.encode(seed);
  const msgBase=enc.encode(svc+len);
  const al=alpha.length, max=256-(256%al);
  let pwd='', ct=0;
  const k=await crypto.subtle.importKey('raw',keyBytes,{name:'HMAC',hash:'SHA-256'},false,['sign']);
  while(pwd.length<len){
    const m=new Uint8Array(msgBase.length+1);m.set(msgBase);m[msgBase.length]=ct++;
    const s=await crypto.subtle.sign('HMAC',k,m);
    for(const b of new Uint8Array(s))if(b<max){pwd+=alpha[b%al];if(pwd.length===len)break;}
  }
  return pwd;
}

function updateStrength(len,sets){
  const bars=document.getElementById('strBars');bars.innerHTML='';
  const info=document.getElementById('strInfo');
  let level,emoji,msg;
  if(len>=14&&sets>=4){level='strong';emoji='uwu';msg='Отличный пароль'}
  else if(len>=10&&sets>=3){level='medium';emoji=':3';msg='Хороший, можно длиннее'}
  else{level='weak';emoji='>.<';msg='Добавьте символов или увеличьте длину'}
  const count={weak:1,medium:2,strong:3}[level];
  const bclass='str-bar on '+level;
  for(let i=0;i<3;i++){
    const b=document.createElement('div');b.className=i<count?bclass:'str-bar';
    bars.appendChild(b);
  }
  info.className='str-info '+level;
  info.textContent=emoji+'  '+msg;
}

async function cpy(){
  const p=document.getElementById('pwd').value;
  if(!p)return;
  try{await navigator.clipboard.writeText(p);}
  catch(e){
    try{document.getElementById('pwd').select();document.execCommand('copy');}
    catch(e2){
      document.getElementById('msg').textContent='Не удалось скопировать';
      setTimeout(()=>document.getElementById('msg').textContent='',2000);return;
    }
  }
  document.getElementById('msg').textContent='Скопировано!';
  setTimeout(()=>document.getElementById('msg').textContent='',1500);
}

async function renderRandomart(pwd){
  const el=document.getElementById('rart');
  el.innerHTML='';
  const enc=new TextEncoder();
  const hash=await crypto.subtle.digest('SHA-256',enc.encode(pwd));
  const hex=Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
  const img=document.createElement('img');
  img.className='rart-img';
  img.src='https://robohash.org/'+hex+'?size=128x128';
  img.alt='Robot hash';
  img.onerror=function(){this.style.display='none';};
  el.appendChild(img);
  document.getElementById('rartWrap').style.display='';
}init();
