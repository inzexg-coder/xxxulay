<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>passgen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{display:none}body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#f5f0ff;color:#1a1a2e;
  padding:20px 24px 16px;max-width:400px;margin:0 auto;overflow-y:auto;height:100vh;display:flex;flex-direction:column;
}
h1{font-size:20px;font-weight:700;color:#5b21b6;margin-bottom:12px;letter-spacing:-.3px;flex-shrink:0}
.card{
  background:#fff;border-radius:14px;padding:18px 18px 14px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(90,20,140,.08)
}
.card-title{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
label{display:block;font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:3px}
input[type="text"],input[type="number"]{
  width:100%;padding:10px 12px;font-size:14px;font-family:inherit;
  border:1.5px solid #e0dce8;border-radius:10px;background:#fff;
  color:#1a1a2e;outline:none;transition:border-color .2s
}
input:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.12)}
.input-wrap{position:relative}
.input-wrap input{padding-right:36px}
.input-icon{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  color:#a855f7;font-size:18px;cursor:pointer;display:none;
  user-select:none;transition:color .15s
}
.input-icon:hover{color:#7c3aed}
.input-icon.show{display:block}
.dropdown{
  position:absolute;top:100%;left:0;right:0;z-index:100;
  background:#fff;border:1.5px solid #e0dce8;border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
  max-height:180px;overflow-y:auto;display:none;margin-top:4px
}
.dropdown.show{display:block}
.dropdown-item{padding:9px 14px;font-size:14px;cursor:pointer}
.dropdown-item:hover{background:#f5f0ff}
.row{display:flex;gap:24px;align-items:flex-start}
.col{flex:0 0 auto}
.len-group{display:flex;align-items:center;gap:3px}
.len-group input{width:52px;text-align:center;font-weight:600}
.len-btn{display:flex;flex-direction:column;gap:2px}
.len-btn button{
  width:26px;height:15px;border:1.5px solid #e0dce8;border-radius:4px;
  background:#fff;color:#a855f7;font-size:9px;cursor:pointer;padding:0;line-height:0
}
.len-btn button:hover{background:#f5f0ff}
.chk-grid{display:grid;grid-template-columns:auto auto;gap:5px 20px}
.chk-item{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:#1a1a2e;user-select:none}
.chk-circle{
  width:18px;height:18px;border-radius:50%;
  border:2px solid #c4bcd4;display:flex;align-items:center;
  justify-content:center;transition:all .2s;flex-shrink:0
}
.chk-circle.on{border-color:#a855f7;background:#a855f7}
.chk-circle.on::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff}
.btn{
  width:100%;padding:12px;font-size:14px;font-weight:600;font-family:inherit;
  border:none;border-radius:11px;cursor:pointer;transition:transform .1s
}
.btn:active{transform:scale(.97)}
.btn-primary{
  background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;
  box-shadow:0 2px 8px rgba(168,85,247,.3)
}
.btn-primary:hover{box-shadow:0 4px 14px rgba(168,85,247,.4)}
.btn-secondary{
  background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;
  box-shadow:0 2px 8px rgba(167,139,250,.3)
}
.btn-secondary:hover{box-shadow:0 4px 14px rgba(167,139,250,.4)}
.pwd-field{
  width:100%;padding:12px;font-size:15px;font-weight:600;
  font-family:'SF Mono','Fira Code',monospace;
  border:1.5px solid #e0dce8;border-radius:10px;background:#fff;
  color:#1a1a2e;text-align:center;outline:none;letter-spacing:.5px
}
.error{font-size:12px;color:#e03131;min-height:16px;margin-top:3px}
.strength{font-size:12px;color:#999;min-height:16px;margin-top:4px}
.msg{text-align:center;font-size:13px;color:#a855f7;font-weight:600;min-height:20px;margin-top:3px}
</style>
</head>
<body>

<h1>passgen</h1>

<div class="card">
  <div class="card-title">Credentials</div>
  <label>Master seed</label>
  <input type="text" id="seed" placeholder="Your secret phrase">
  <div class="error" id="seedErr"></div>
</div>

<div class="card">
  <div class="card-title">Service</div>
  <label>Service name</label>
  <div class="input-wrap">
    <input type="text" id="service" placeholder="e.g. google, vk, github">
    <span class="input-icon" id="svcArrow" onclick="toggleDD()">&#9662;</span>
    <div class="dropdown" id="dd"></div>
  </div>
  <div class="error" id="svcErr"></div>
</div>

<div class="card">
  <div class="card-title">Options</div>
  <div class="row">
    <div class="col">
      <label>Length</label>
      <div class="len-group">
        <input type="number" id="length" value="10" min="1" max="99">
        <div class="len-btn">
          <button onclick="adj(1)">&#9650;</button>
          <button onclick="adj(-1)">&#9660;</button>
        </div>
      </div>
    </div>
    <div class="col">
      <label>Characters</label>
      <div class="chk-grid" id="chkGrid"></div>
    </div>
  </div>
</div>

<button class="btn btn-primary" onclick="gen()">Generate</button>

<div class="card" style="margin-top:12px">
  <div class="card-title">Password</div>
  <input class="pwd-field" id="pwd" readonly>
  <div class="strength" id="str"></div>
</div>

<button class="btn btn-secondary" onclick="cpy()" style="margin-top:auto">Copy</button>
<div class="msg" id="msg"></div>

<script>
// ── State ──
const CHK = [
  ['capitals','Capitals','ABCDEFGHJKLMNPQRSTUVWXYZ'],
  ['lowercase','Lowercase','abcdefghikmnpqrstuvwxyz'],
  ['digits','Digits','0123456789'],
  ['symbols','Symbols','!@#$%&*+=-.'],
];
let state = {capitals:1,lowercase:1,digits:0,symbols:1};
let svcs = [];
let ddOpen = false;

// ── Init ──
function init(){
  renderChk();
  const saved = localStorage.getItem('passgen_state');
  if(saved){
    try{
      const d=JSON.parse(saved);
      state=d.state||state;
      svcs=d.svcs||[];
      document.getElementById('length').value=d.len||10;
      renderChk();
      updateArrow();
    }catch(e){}
  }
  document.getElementById('seed').addEventListener('input',clearErr);
  document.getElementById('service').addEventListener('input',clearErr);
  document.getElementById('service').addEventListener('keydown',e=>{if(e.key==='Enter')gen()});
  document.addEventListener('click',e=>{
    if(!e.target.closest('.input-wrap'))hideDD();
  });
}

// ── Checkboxes ──
function renderChk(){
  const g=document.getElementById('chkGrid');g.innerHTML='';
  for(const[id,lbl]of CHK){
    const d=document.createElement('div');d.className='chk-item';
    d.onclick=()=>{state[id]=+!state[id];renderChk();save();};
    const c=document.createElement('span');
    c.className='chk-circle'+(state[id]?' on':'');
    const t=document.createElement('span');t.textContent=lbl;
    d.appendChild(c);d.appendChild(t);g.appendChild(d);
  }
}

// ── Length ──
function adj(d){const i=document.getElementById('length');let v=+i.value+d;i.value=v<1?1:v>99?99:v;}

// ── Dropdown ──
function toggleDD(){ddOpen?hideDD():showDD();}
function showDD(){
  if(!svcs.length)return;
  const dd=document.getElementById('dd');dd.innerHTML='';
  for(const s of svcs){
    const d=document.createElement('div');d.className='dropdown-item';
    d.textContent=s;
    d.onclick=()=>{document.getElementById('service').value=s;hideDD();clearErr();};
    dd.appendChild(d);
  }
  dd.classList.add('show');ddOpen=true;
}
function hideDD(){document.getElementById('dd').classList.remove('show');ddOpen=false;}
function updateArrow(){
  const a=document.getElementById('svcArrow');
  a.classList.toggle('show',svcs.length>0);
}

// ── Errors ──
function clearErr(){document.getElementById('seedErr').textContent='';document.getElementById('svcErr').textContent='';}
function setErr(f,m){document.getElementById(f+'Err').textContent=m;}

// ── Generate (HMAC-SHA256 via Web Crypto API) ──
async function gen(){
  const seed=document.getElementById('seed').value.trim();
  const svc=document.getElementById('service').value.trim();
  const len=+document.getElementById('length').value||10;
  clearErr();
  if(!seed){setErr('seed','Enter master seed');return;}
  if(!svc){setErr('svc','Enter service name');return;}

  const sets=Object.values(state).filter(Boolean).length;
  if(!sets){setErr('seed','Select at least one character type');return;}

  const alpha=CHK.filter(([id])=>state[id]).map(([,,l])=>l).join('');
  const pwd=await hmacGen(seed,svc,len,alpha);

  document.getElementById('pwd').value=pwd;
  document.getElementById('str').textContent=len>=14&&sets>=4?'Strong':len>=10&&sets>=3?'Medium':'Weak';

  if(!svcs.includes(svc)){svcs.push(svc);updateArrow();}
  save();
}

async function hmacGen(seed,svc,len,alpha){
  const enc=new TextEncoder();
  const keyBytes=enc.encode(seed);
  const msgBase=enc.encode(svc+len);
  const al=alpha.length, max=256-(256%al);
  let pwd='', ct=0;
  const k=await crypto.subtle.importKey('raw',keyBytes,{name:'HMAC',hash:'SHA-256'},false,['sign']);
  while(pwd.length<len){
    const m=new Uint8Array(msgBase.length+1);m.set(msgBase);m[msgBase.length]=ct++;
    const s=await crypto.subtle.sign('HMAC',k,m);
    for(const b of new Uint8Array(s))if(b<max){pwd+=alpha[b%al];if(pwd.length===len)break;}
  }
  return pwd;
}

// ── Copy ──
async function cpy(){
  const p=document.getElementById('pwd').value;
  if(!p)return;
  try{await navigator.clipboard.writeText(p);}catch{
    document.getElementById('pwd').select();document.execCommand('copy');
  }
  document.getElementById('msg').textContent='Copied!';
  setTimeout(()=>document.getElementById('msg').textContent='',1500);
}

// ── Save ──
function save(){
  try{localStorage.setItem('passgen_state',JSON.stringify({
    state,svcs,len:+document.getElementById('length').value
  }));}catch(e){}
}

init();
</script>
</body>
</html>
