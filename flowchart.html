<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>passgen — Блок-схема</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#f0eef5;font-family:Segoe UI,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;padding:20px
  }
  h1{font-size:22px;color:#5b21b6;margin-bottom:2px}
  .sub{font-size:13px;color:#888;margin-bottom:12px}
  .wrap{background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:8px;overflow-x:auto}
  svg{display:block;max-width:100%;height:auto}
  .note{max-width:900px;margin-top:10px;font-size:9.5px;color:#999;text-align:center;line-height:1.5}
</style>
</head>
<body>
<h1>passgen</h1>
<div class="sub">Блок-схема вызова функций при генерации пароля и логина</div>
<div class="wrap">
<svg width="900" height="850" viewBox="0 0 900 850" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    text{font-family:Arial,Helvetica,sans-serif;font-size:10px;fill:#1a1a2e}
    .t{font-weight:700;font-size:11px;text-anchor:middle}
    .s{font-size:9px;text-anchor:middle;fill:#444}
    .p{font-size:8px;text-anchor:middle;fill:#555}
    .e{font-size:9px;font-weight:700;text-anchor:middle;fill:#b71c1c}
    .l{font-size:9px;font-weight:600;text-anchor:middle;fill:#7b4da8}
    .h{font-size:12px;font-weight:700;text-anchor:middle;fill:#5b21b6}
  </style>
  <marker id="a" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#7b4da8"/>
  </marker>
</defs>

<rect width="900" height="850" fill="#faf9ff"/>
<line x1="450" y1="10" x2="450" y2="810" stroke="#d5d0e0" stroke-width="1" stroke-dasharray="4,4"/>

<text x="225" y="22" class="h">ГЕНЕРАЦИЯ ПАРОЛЯ</text>
<text x="675" y="22" class="h">ГЕНЕРАЦИЯ ЛОГИНА</text>

<!-- ==================== LEFT: gen() ==================== -->

<!-- 1. Пуск -->
<ellipse cx="225" cy="50" rx="55" ry="15" fill="#d5c4e0" stroke="#9b59b6" stroke-width="1.5"/>
<text x="225" y="47" class="t">Пуск</text>
<text x="225" y="58" class="s">клик Создать</text>
<line x1="225" y1="65" x2="225" y2="80" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 2. gen() -->
<rect x="175" y="83" width="100" height="24" rx="4" fill="#e9ddf7" stroke="#9b59b6" stroke-width="1.5"/>
<line x1="179" y1="83" x2="179" y2="107" stroke="#9b59b6" stroke-width="2.5"/>
<line x1="271" y1="83" x2="271" y2="107" stroke="#9b59b6" stroke-width="2.5"/>
<text x="225" y="99" class="t">gen()</text>
<line x1="225" y1="107" x2="225" y2="122" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 3. Данные -->
<polygon points="155,125 295,125 281,145 141,145" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.2"/>
<text x="218" y="136" class="t" font-size="10px">Чтение DOM</text>
<text x="218" y="145" class="s" font-size="8px">seed svc len state inv</text>
<line x1="225" y1="145" x2="225" y2="160" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 4. seed пуст? -->
<polygon points="225,163 286,205 225,247 164,205" fill="#dcedc8" stroke="#8bc34a" stroke-width="1.5"/>
<text x="225" y="201" class="t" font-size="11px">seed</text>
<text x="225" y="213" class="t" font-size="11px">пуст?</text>
<line x1="286" y1="205" x2="318" y2="205" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="320" y="194" width="80" height="22" rx="3" fill="#ffcdd2" stroke="#e57373" stroke-width="1.2"/>
<text x="360" y="205" class="e">Розовая подсветка</text>
<text x="360" y="215" class="e" font-size="8px">return</text>
<line x1="225" y1="247" x2="225" y2="262" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 5. Типы выбраны? -->
<polygon points="225,265 286,307 225,349 164,307" fill="#dcedc8" stroke="#8bc34a" stroke-width="1.5"/>
<text x="225" y="302" class="t" font-size="10px">Типы символов</text>
<text x="225" y="314" class="t" font-size="10px">выбраны?</text>
<line x1="286" y1="307" x2="318" y2="307" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="320" y="296" width="80" height="22" rx="3" fill="#ffcdd2" stroke="#e57373" stroke-width="1.2"/>
<text x="360" y="309" class="e">Ошибка</text>
<text x="360" y="317" class="e" font-size="8px">return</text>
<line x1="225" y1="349" x2="225" y2="364" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 6. alpha -->
<polygon points="145,367 305,367 291,387 131,387" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.2"/>
<text x="218" y="378" class="t" font-size="10px">Формирование alpha</text>
<text x="218" y="387" class="s" font-size="8px">из CHK по state[id]</text>
<line x1="225" y1="387" x2="225" y2="404" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 7. hmacGen -->
<rect x="173" y="407" width="104" height="28" rx="4" fill="#e9ddf7" stroke="#9b59b6" stroke-width="1.5"/>
<line x1="177" y1="407" x2="177" y2="435" stroke="#9b59b6" stroke-width="2.5"/>
<line x1="273" y1="407" x2="273" y2="435" stroke="#9b59b6" stroke-width="2.5"/>
<text x="225" y="422" class="t" font-size="10px">hmacGen(</text>
<text x="225" y="434" class="s" font-size="9px">seed svc len alpha)</text>
<rect x="291" y="409" width="82" height="12" rx="2" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
<text x="332" y="418" class="s" font-size="7.5px">seed = ключ HMAC</text>
<rect x="291" y="423" width="82" height="12" rx="2" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
<text x="332" y="432" class="s" font-size="7.5px">svc+len = сообщение</text>
<line x1="225" y1="435" x2="225" y2="452" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- ===== LOOP ===== -->
<!-- Условие -->
<polygon points="225,455 290,502 225,549 160,502" fill="#dcedc8" stroke="#8bc34a" stroke-width="1.5"/>
<text x="225" y="498" class="t" font-size="10px">pwd.length</text>
<text x="225" y="508" class="t" font-size="10px">&lt; len?</text>
<text x="260" y="480" class="l">нет</text>
<line x1="225" y1="549" x2="225" y2="564" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>
<text x="235" y="557" class="l" font-size="8px">да</text>

<!-- Тело цикла 1 -->
<rect x="170" y="567" width="110" height="18" rx="3" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.2"/>
<text x="225" y="579" class="s" font-size="9px">1. msg = svc + len + ct</text>
<line x1="225" y1="585" x2="225" y2="595" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Тело цикла 2 -->
<rect x="170" y="598" width="110" height="18" rx="3" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.2"/>
<text x="225" y="610" class="s" font-size="9px">2. importKey + sign</text>
<line x1="225" y1="616" x2="225" y2="626" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Тело цикла 3 -->
<rect x="170" y="629" width="110" height="18" rx="3" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.2"/>
<text x="225" y="641" class="s" font-size="9px">3. byte &lt; max</text>
<line x1="225" y1="647" x2="225" y2="657" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Тело цикла 4 -->
<rect x="170" y="660" width="110" height="18" rx="3" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.2"/>
<text x="225" y="672" class="s" font-size="9px">4. ct++</text>

<!-- Стрелка назад (цикл) -->
<line x1="280" y1="669" x2="325" y2="669" stroke="#7b4da8" stroke-width="1.2"/>
<line x1="325" y1="669" x2="325" y2="502" stroke="#7b4da8" stroke-width="1.2"/>
<line x1="325" y1="502" x2="292" y2="502" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>
<text x="327" y="586" class="l">цикл</text>

<!-- Выход из цикла -->
<line x1="225" y1="678" x2="225" y2="693" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Инверсии -->
<polygon points="225,696 290,748 225,800 160,748" fill="#dcedc8" stroke="#8bc34a" stroke-width="1.5"/>
<text x="225" y="742" class="t" font-size="10px">inv.cap?</text>
<text x="225" y="752" class="s" font-size="8px">toUpperCase()</text>
<text x="225" y="765" class="t" font-size="10px">inv.dig?</text>
<text x="225" y="775" class="s" font-size="8px">HMAC цифра</text>

<line x1="225" y1="800" x2="225" y2="815" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Конец левой части - без "Конец" терминатора, т.к. не влезает -->

<!-- ==================== RIGHT: genLogin() ==================== -->

<!-- 1. Пуск -->
<ellipse cx="675" cy="50" rx="58" ry="15" fill="#d5c4e0" stroke="#9b59b6" stroke-width="1.5"/>
<text x="675" y="47" class="t">Пуск</text>
<text x="675" y="58" class="s">клик Создать логин</text>
<line x1="675" y1="65" x2="675" y2="80" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 2. genLogin() -->
<rect x="625" y="83" width="100" height="24" rx="4" fill="#e9ddf7" stroke="#9b59b6" stroke-width="1.5"/>
<line x1="629" y1="83" x2="629" y2="107" stroke="#9b59b6" stroke-width="2.5"/>
<line x1="721" y1="83" x2="721" y2="107" stroke="#9b59b6" stroke-width="2.5"/>
<text x="675" y="99" class="t">genLogin()</text>
<line x1="675" y1="107" x2="675" y2="122" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 3. Очистка -->
<polygon points="605,125 745,125 731,145 591,145" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.2"/>
<text x="668" y="136" class="t" font-size="10px">Очистка #login</text>
<text x="668" y="145" class="s" font-size="8px">чтение seed svc</text>
<line x1="675" y1="145" x2="675" y2="160" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 4. seed пуст? -->
<polygon points="675,163 736,205 675,247 614,205" fill="#dcedc8" stroke="#8bc34a" stroke-width="1.5"/>
<text x="675" y="201" class="t" font-size="11px">seed</text>
<text x="675" y="213" class="t" font-size="11px">пуст?</text>
<line x1="736" y1="205" x2="760" y2="205" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="762" y="195" width="70" height="20" rx="3" fill="#ffcdd2" stroke="#e57373" stroke-width="1.2"/>
<text x="797" y="205" class="e">Ошибка</text>
<text x="797" y="214" class="e" font-size="8px">return</text>
<line x1="675" y1="247" x2="675" y2="262" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 5. svc пуст? -->
<polygon points="675,265 736,307 675,349 614,307" fill="#dcedc8" stroke="#8bc34a" stroke-width="1.5"/>
<text x="675" y="302" class="t" font-size="11px">svc</text>
<text x="675" y="314" class="t" font-size="11px">пуст?</text>
<line x1="736" y1="307" x2="760" y2="307" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="762" y="297" width="60" height="20" rx="3" fill="#ffcdd2" stroke="#e57373" stroke-width="1.2"/>
<text x="792" y="309" class="e">return</text>
<line x1="675" y1="349" x2="675" y2="364" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 6. loginCounter++ -->
<polygon points="605,367 745,367 731,387 591,387" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.2"/>
<text x="668" y="378" class="t" font-size="10px">loginCounter++</text>
<line x1="675" y1="387" x2="675" y2="404" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 7. SHA-256 -->
<rect x="623" y="407" width="104" height="28" rx="4" fill="#e9ddf7" stroke="#9b59b6" stroke-width="1.5"/>
<line x1="627" y1="407" x2="627" y2="435" stroke="#9b59b6" stroke-width="2.5"/>
<line x1="723" y1="407" x2="723" y2="435" stroke="#9b59b6" stroke-width="2.5"/>
<text x="675" y="420" class="t" font-size="10px">SHA-256(</text>
<text x="675" y="434" class="s" font-size="8px">seed+login+svc+counter)</text>
<rect x="740" y="411" width="80" height="12" rx="2" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
<text x="780" y="420" class="s" font-size="7.5px">входные данные</text>
<text x="780" y="428" class="s" font-size="7px">seed+login+svc+counter</text>
<line x1="675" y1="435" x2="675" y2="452" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 8. 6 байт -->
<polygon points="530,455 820,455 806,475 516,475" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.2"/>
<text x="675" y="466" class="t" font-size="10px">6 байт из хеша alpha</text>
<text x="675" y="475" class="s" font-size="7px">abcdefghjkmnpqrstuvwxyz23456789</text>
<rect x="825" y="457" width="62" height="16" rx="2" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
<text x="856" y="465" class="s" font-size="7px">i l o 0 1</text>
<text x="856" y="473" class="s" font-size="7px">исключены</text>
<line x1="675" y1="475" x2="675" y2="492" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 9. Вывод -->
<polygon points="615,495 735,495 721,515 601,515" fill="#fff3e0" stroke="#ffb300" stroke-width="1.2"/>
<text x="668" y="506" class="t" font-size="10px">Вывод login в #login</text>
<line x1="675" y1="515" x2="675" y2="552" stroke="#7b4da8" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Конец -->
<ellipse cx="675" cy="570" rx="50" ry="15" fill="#d5c4e0" stroke="#9b59b6" stroke-width="1.5"/>
<text x="675" y="574" class="t">Конец</text>

<!-- ==================== Выходы из цикла (левая половина) ==================== -->
<!-- Конец левой части -->
<ellipse cx="225" cy="830" rx="50" ry="15" fill="#d5c4e0" stroke="#9b59b6" stroke-width="1.5"/>
<text x="225" y="834" class="t">Конец</text>

<!-- ==================== LEGEND ==================== -->
<rect x="10" y="815" width="880" height="20" rx="4" fill="#f5f3ff" stroke="#d5d0e0" stroke-width="1"/>
<text x="20" y="828" font-family="Arial,sans-serif" font-size="9px" fill="#555" font-weight="700">Условные обозначения:</text>
<ellipse cx="140" cy="824" rx="10" ry="5" fill="#d5c4e0" stroke="#9b59b6" stroke-width="1"/>
<text x="155" y="828" font-family="Arial,sans-serif" font-size="8px" fill="#555">Терминатор</text>
<rect x="230" y="820" width="14" height="8" rx="2" fill="#e9ddf7" stroke="#9b59b6" stroke-width="1"/>
<text x="249" y="828" font-family="Arial,sans-serif" font-size="8px" fill="#555">Процесс</text>
<rect x="310" y="819" width="10" height="10" fill="#dcedc8" stroke="#8bc34a" stroke-width="1" transform="rotate(45,315,824)"/>
<text x="330" y="828" font-family="Arial,sans-serif" font-size="8px" fill="#555">Решение</text>
<polygon points="395,820 402,828 395,836 388,828" fill="#d6eaf8" stroke="#2980b9" stroke-width="1"/>
<text x="410" y="828" font-family="Arial,sans-serif" font-size="8px" fill="#555">Данные</text>
<rect x="470" y="820" width="14" height="8" rx="2" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
<text x="489" y="828" font-family="Arial,sans-serif" font-size="8px" fill="#555">Тело цикла</text>
<rect x="565" y="820" width="14" height="8" rx="2" fill="#fff3e0" stroke="#ffb300" stroke-width="1"/>
<text x="584" y="828" font-family="Arial,sans-serif" font-size="8px" fill="#555">Вывод</text>
<rect x="635" y="820" width="14" height="8" rx="2" fill="#ffcdd2" stroke="#e57373" stroke-width="1"/>
<text x="654" y="828" font-family="Arial,sans-serif" font-size="8px" fill="#555">Ошибка</text>
<rect x="710" y="820" width="14" height="8" rx="2" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
<text x="729" y="828" font-family="Arial,sans-serif" font-size="8px" fill="#555">Параметр</text>
</svg>
</div>
<div class="note">
<b>HMAC-SHA256:</b> сид = ключ. Сообщение = svc + len + счётчик ct. Rejection Sampling: max = 256-(256%len), байты &ge; max отбрасываются. | <b>SHA-256 (логин):</b> обычный хеш (не HMAC). loginCounter при каждом клике даёт уникальный логин.
</div>
</body>
</html>
